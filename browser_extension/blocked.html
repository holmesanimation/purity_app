<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Outside Browsing Session</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f1efe6;
        --card: #fffdfa;
        --text: #2f2a24;
        --muted: #6d655b;
        --border: #d8d0c3;
        --accent: #315c3c;
        --accent-strong: #274a2f;
      }

      body {
        font-family: Georgia, "Palatino Linotype", serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(49, 92, 60, 0.14), transparent 38%),
          linear-gradient(180deg, #f8f5ed 0%, var(--bg) 100%);
        color: var(--text);
      }

      .card {
        width: min(560px, calc(100vw - 40px));
        padding: 32px;
        border-radius: 22px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: 0 18px 48px rgba(47, 42, 36, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: var(--muted);
      }

      .url {
        margin: 18px 0 22px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #f6f2e8;
        border: 1px solid var(--border);
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .actions {
        display: flex;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 20px;
        font: inherit;
        cursor: pointer;
      }

      #yes-btn {
        background: var(--accent);
        color: white;
      }

      #yes-btn:hover {
        background: var(--accent-strong);
      }

      #no-btn {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>This URL was not whitelisted for this session. Are you sure?</h1>
      <p>Choosing Yes adds it to the current Purity browsing session immediately.</p>
      <div class="url" id="blocked-url"></div>
      <div class="actions">
        <button id="yes-btn" type="button">Yes</button>
        <button id="no-btn" type="button">No</button>
      </div>
    </main>
    <script src="blocked.js"></script>
  </body>
 </html>
